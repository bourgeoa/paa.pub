<div class="landing">
  <div class="landing-header">
    <h1>{{siteName}}</h1>
    <p class="text-muted">A Solid + ActivityPub server</p>
  </div>

  <div class="landing-cards">
    <div class="card login-card">
      <h2>Sign In</h2>
      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
      </form>
      <div id="passkey-login" class="mt-1">
        <button type="button" class="btn btn-secondary hidden" onclick="passkeyLogin()" id="passkey-btn">Sign in with Passkey</button>
      </div>
      <div id="fedcm-login" class="mt-1">
        <button type="button" class="btn btn-secondary hidden" onclick="fedcmLogin()" id="fedcm-btn">Sign in with FedCM</button>
      </div>
      <script src="/scripts/webauthn-utils.js"></script>
      <script src="/scripts/passkey-login.js"></script>
      <script src="/scripts/fedcm-login.js"></script>
    </div>

    {{#registrationOpen}}
    <div class="card login-card">
      <h2>Create Account</h2>
      <form method="POST" action="/signup">
        <div class="form-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" name="username" pattern="[a-zA-Z0-9_\-]+" title="Letters, numbers, hyphens, and underscores only" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" minlength="8" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" minlength="8" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn">Create Account</button>
      </form>
    </div>
    {{/registrationOpen}}
  </div>
</div>
