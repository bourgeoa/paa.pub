<div class="card login-card">
  <h1>Sign Up</h1>
  {{#error}}
  <div class="error">{{error}}</div>
  {{/error}}
  <form method="POST" action="/signup">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" pattern="[a-zA-Z0-9_\-]+" title="Letters, numbers, hyphens, and underscores only" autocomplete="username" required autofocus value="{{username}}">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" minlength="8" autocomplete="new-password" required>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password" minlength="8" autocomplete="new-password" required>
    </div>
    <button type="submit" class="btn">Create Account</button>
  </form>
  <p class="text-muted mt-1">Already have an account? <a href="/login">Sign in</a></p>
</div>
